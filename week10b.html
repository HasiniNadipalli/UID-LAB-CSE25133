<!DOCTYPE html>
<html>
<head>
    <title>Sort Three Numbers</title>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
        }
        .box:hover {
            transform: scale(1.03);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        input:focus {
            border-color: #ff758c;
            outline: none;
            box-shadow: 0 0 6px rgba(255,117,140,0.4);
        }
        select {
            width: 95%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 6px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 6px;
            background: #ff758c;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #e64965;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Sort 3 Numbers</h2>

    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <input type="number" id="num3" placeholder="Enter third number">

    <!-- Sorting Option -->
    <select id="order">
        <option value="desc">Descending</option>
        <option value="asc">Ascending</option>
    </select>

    <button onclick="sortNumbers()">Sort Numbers</button>
    <button onclick="resetFields()">Reset</button>

    <p id="result"></p>
</div>

<script>

function sortNumbers() {
    let a = parseFloat(document.getElementById("num1").value);
    let b = parseFloat(document.getElementById("num2").value);
    let c = parseFloat(document.getElementById("num3").value);
    let order = document.getElementById("order").value;
    let res = document.getElementById("result");

    if (isNaN(a) || isNaN(b) || isNaN(c)) {
        alert("Please enter all numbers");
        return;
    }

    let largest, middle, smallest;

    // Same logic
    if (a >= b && a >= c) {
        largest = a;
        if (b >= c) { middle = b; smallest = c; }
        else { middle = c; smallest = b; }
    } 
    else if (b >= a && b >= c) {
        largest = b;
        if (a >= c) { middle = a; smallest = c; }
        else { middle = c; smallest = a; }
    } 
    else {
        largest = c;
        if (a >= b) { middle = a; smallest = b; }
        else { middle = b; smallest = a; }
    }

    let output;

    if (order === "asc") {
        output = "Ascending: " + smallest + " , " + middle + " , " + largest;
    } else {
        output = "Descending: " + largest + " , " + middle + " , " + smallest;
    }

    res.innerHTML = output;
    alert(output);
}

function resetFields() {
    document.getElementById("num1").value = "";
    document.getElementById("num2").value = "";
    document.getElementById("num3").value = "";
    document.getElementById("result").innerHTML = "";
}

</script>

</body>
</html>
