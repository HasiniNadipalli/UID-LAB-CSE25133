<!DOCTYPE html>
<html>
<head>
    <title>Student Grade Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,lightyellow,lightsteelblue);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .inputs input {
            width: 80px;
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            text-align: center;
            transition: 0.3s;
        }

        .inputs input:focus {
            border-color: #667eea;
            outline: none;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        #output {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f1f5f9;
            font-weight: bold;
        }

        .grade-A { color: green; }
        .grade-B { color: blue; }
        .grade-C { color: orange; }
        .grade-D { color: brown; }
        .grade-F { color: red; }
    </style>
</head>

<body>

    <div class="container">
        <h2> Grade Calculator</h2>

        <div class="inputs">
            <input type="number" id="m1" placeholder="S1">
            <input type="number" id="m2" placeholder="S2">
            <input type="number" id="m3" placeholder="S3"><br>
            <input type="number" id="m4" placeholder="S4">
            <input type="number" id="m5" placeholder="S5">
            <input type="number" id="m6" placeholder="S6">
        </div>

        <button onclick="calculateGrade()">Calculate</button>

        <div id="output">Enter marks and click Calculate</div>
    </div>

    <script>
        function calculateGrade() {
            let m1 = Number(document.getElementById("m1").value);
            let m2 = Number(document.getElementById("m2").value);
            let m3 = Number(document.getElementById("m3").value);
            let m4 = Number(document.getElementById("m4").value);
            let m5 = Number(document.getElementById("m5").value);
            let m6 = Number(document.getElementById("m6").value);

            let avg = (m1 + m2 + m3 + m4 + m5 + m6) / 6;
            let grade = "";
            let gradeClass = "";

            if (avg < 60) {
                grade = "F";
                gradeClass = "grade-F";
            } else if (avg < 70) {
                grade = "D"; 
                gradeClass = "grade-D";
            } else if (avg < 80) {
                grade = "C";
                gradeClass = "grade-C";
            } else if (avg < 90) {
                grade = "B";
                gradeClass = "grade-B";
            } else if (avg <= 100) {
                grade = "A";
                gradeClass = "grade-A";
            } else {
                grade = "Invalid";
            }

            document.getElementById("output").innerHTML =
                "Average: " + avg.toFixed(2) +
                "<br>Grade: <span class='" + gradeClass + "'>" + grade + "</span>";
        }
    </script>

</body>
</html>
