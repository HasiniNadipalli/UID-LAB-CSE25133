<!DOCTYPE html>
<html lang="en">
<head>
    <title>Username Validation</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background: linear-gradient(135deg, #80f3de, #d7f6f6);
        }
        .container{
            background:white;
            padding:35px;
            border-radius:20px;
            width:350px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }
        h2{
            margin-bottom:20px;
            color:#333;
        }
        input{
            width:100%;
            padding:14px;
            border:2px solid #ddd;
            border-radius:10px;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }
        input:focus{
            border-color:#7af2dc;;
            box-shadow:0 0 10px rgba(76,175,80,0.4);
        }
        button{
            margin-top:15px;
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#80f3de;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }
        button:hover{
            transform:scale(1.03);
        }
        #message{
            margin-top:15px;
            font-size:15px;
            font-weight:bold;
        }
        .error{
            color:red;
        }
        .success{
            color:green;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Username Validation</h2>
        <input 
            type="text" 
            id="username" 
            placeholder="Enter Username">
        <button onclick="checkUsername()">Submit</button>
        <p id="message"></p>
    </div>
    <script>
        let username = document.getElementById("username");
        let message = document.getElementById("message");
            function checkUsername(){
                if(username.value.length > 0 &&username.value.length < 5){
                    message.innerHTML ="Username must be at least 5 characters";
                    message.className = "error";
                    alert("Username must contain at least 5 characters");
                }
                else if(username.value.length >= 5){
                    message.innerHTML ="Valid Username";
                    message.className = "success";
                    alert("Username Submitted Successfully!");
                }
                else{
                    message.innerHTML ="Please enter a username";
                    message.className = "error";
                    alert("Please enter a username");
                }
            }
            username.addEventListener("input", function(){
                if(username.value.length > 0 &&username.value.length < 5){
                    message.innerHTML ="Username must be at least 5 characters";
                    message.className = "error";
                }
                else if(username.value.length >= 5){
                    message.innerHTML ="Valid Username";
                    message.className = "success";
                }
                else{message.innerHTML = "";}
            });
            username.addEventListener("keypress",
            function(event){
                if(event.key === "Enter"){checkUsername();}
            });
</script>
</body>
</html>
