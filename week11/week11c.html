<!DOCTYPE html>
<html lang="en">
<head>
    <title>Password Strength Checker</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background: linear-gradient(135deg,#84fab0,#8fd3f4);
        }
        .container{
            background:white;
            padding:40px;
            width:380px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }
        h2{
            margin-bottom:25px;
            color:#333;
            font-size:34px;
        }
        input{
            width:100%;
            padding:15px;
            border:2px solid #ccc;
            border-radius:10px;
            font-size:17px;
            outline:none;
            transition:0.3s;
        }
        input:focus{
            border-color:#66bb6a;
            box-shadow:0 0 8px rgba(102,187,106,0.3);
        }
        button{
            width:100%;
            padding:14px;
            margin-top:12px;
            border:none;
            border-radius:10px;
            background: linear-gradient(135deg,#84fab0,#8fd3f4);
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }
        button:hover{
            transform:translateY(-2px);
            opacity:0.9;
        }
        #message{
            margin-top:18px;
            font-size:18px;
            font-weight:bold;
        }
        .weak{
            color:red;
        }
        .medium{
            color:orange;
        }
        .strong{
            color:green;
        }

    </style>
</head>
<body>
    <div class="container">
        <h2>Password</h2>
        <input 
            type="password"
            id="password"
            placeholder="Enter Password">
        <p id="message"></p>
        <button onclick="checkPassword()">Submit</button>
    </div>
    <script>
        let password =document.getElementById("password");
        let message =document.getElementById("message");
        password.addEventListener("input",
        function(){
            let pass = password.value;
            if(pass.length < 5 && pass.length > 0){
                message.innerHTML ="Weak Password";
                message.className ="weak";
            }
            else if(pass.length >= 5 && pass.length < 8){
                message.innerHTML = "Medium Password";
                message.className = "medium";
            }
            else if(pass.length >= 8){
                message.innerHTML ="Strong Password";
                message.className ="strong";
            }
            else{message.innerHTML = "";}
        });
        function checkPassword(){
            let pass = password.value;
            if(pass.length === 0){
                alert("Please enter a password");
            }
            else if(pass.length < 5){
                alert("Weak Password");
            }
            else if(pass.length >= 5 && pass.length < 8){
                alert("Medium Password");
            }
            else{
                alert("Strong Password Submitted!");
            }
        }
        password.addEventListener("keypress",
        function(event){
            if(event.key === "Enter"){checkPassword();}
        });
    </script>
</body>
</html>
