<!DOCTYPE html>
<html>
<head>
    <title>Simple Web Page Demo</title>

    <style>
        /* Background color and image */
        body {
            background-color: lightblue;  /* Background color */
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvpVoQUG6htL0eoevj8f9n6W_1mZBggpjTyg&s");
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            font-family:'Times New Roman', Times, serif;
        }

        /* Heading styling */
        h1 {
            color: rgb(38, 114, 227);
            text-align: center;
            text-decoration: underline;
            font-size: 40px;
        }

        h2 {
            color: rgb(223, 49, 171);
            margin-left: 20px;
        }

        /* Paragraph styling */
        p {
            font-size: 18px;
            margin-left: 20px;
        }

        /* Preformatted text styling */
        pre {
            background-color:antiquewhite;
            padding: 15px;
            border: 2px solid black;
            width: fit-content;
            margin-left: 20px;
        }
    </style>
</head>

<body>

    <h1>Welcome to My Web Page</h1>

    <h2>About This Page</h2>
    <p>This page demonstrates background color, background image, heading styling, and preformatted text in HTML.</p>

    <h2>Sample Preformatted Text</h2>

    <pre>
Name    : Hasini
Course  : Web Development
College : Amrita University
    </pre>

</body>
</html>
