<!DOCTYPE html>
<html lang="en">
<head>
    <title>Email Validation Form</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background: linear-gradient(135deg,#ff9a9e,#fad0c4);
        }
        .container{
            background:white;
            padding:40px;
            border-radius:20px;
            width:380px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
        }
        h2{
            margin-bottom:25px;
            color:#333;
            font-size:38px;
            font-weight:bold;
        }
        input{
            width:100%;
            padding:15px;
            margin:12px 0;
            border:2px solid #ccc;
            border-radius:10px;
            font-size:18px;
            outline:none;
            transition:0.3s;
        }
        input:focus{
            border-color:#ff8fab;
            box-shadow:0 0 8px rgba(255,143,171,0.3);
        }
        button{
            width:100%;
            padding:14px;
            margin-top:12px;
            border:none;
            border-radius:10px;
            background: linear-gradient(135deg,#ff9a9e,#fad0c4);
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }
        button:hover{
            transform:translateY(-2px);
            opacity:0.9;
        }
        #message{
            margin-top:18px;
            font-size:17px;
            font-weight:bold;
        }
        .error{
            color:red;
        }
        .success{
            color:green;
        }

    </style>
</head>
<body>

    <div class="container">
        <h2>Registration Form</h2>

        <form id="registerForm">

            <input 
                type="text"
                placeholder="Enter Name"
                required>

            <input 
                type="text"
                id="email"
                placeholder="Enter Email"
                required>

            <button type="submit">Submit</button>

        </form>

        <p id="message"></p>
    </div>

<script>
    const form = document.getElementById("registerForm");
    const email = document.getElementById("email");
    const message = document.getElementById("message");

    form.addEventListener("submit", function(event){

        event.preventDefault();

        let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

        if(email.value.match(emailPattern)){

            message.innerHTML = "Email is valid!";
            message.className = "success";
            alert("Registration Form Submitted Successfully!");
            form.reset();
        }

        else{
            message.innerHTML = "Invalid Email Format";
            message.className = "error";
            alert("Please enter a valid email!");
        }
    });
</script>
</body>
</html>
