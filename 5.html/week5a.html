<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diffferent places in India</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:Georgia, 'Times New Roman', Times, serif;
    }

    body {
        background-color: #f4f4f4;
        padding: 40px;
    }

    .container {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    .card {
        background: white;
        width: 300px;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        transition: transform 0.3s ease;
    }

    .card:hover {
        transform: translateY(-10px);
    }

    .card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }

    .card-content {
        padding: 20px;
        text-align: center;
    }

    .card-content h3 {
        margin-bottom: 10px;
    }

    .card-content p {
        font-size: 14px;
        color: #555;
        margin-bottom: 15px;
    }

    .card-content button {
        padding: 10px 20px;
        border: none;
        background-color: #007bff;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.3s;
    }

    .card-content button:hover {
        background-color: #0056b3;
    }

    /* Tablet View */
    @media (max-width: 900px) {
        .card {
            width: 45%;
        }
    }

    /* Mobile View */
    @media (max-width: 600px) {
        .card {
            width: 100%;
        }
    }
</style>

</head>
<body>

<div class="container">

    <div class="card">
        <img src="https://thumbs.dreamstime.com/b/taj-mahal-sunset-light-agra-india-72653577.jpg" alt="Image 1">
        <div class="card-content">
            <h3>Taj Mahal</h3>
            <p>It is one of a seven wonders in world that located in India.</p>
            <button>Read More</button>
        </div>
    </div>

    <div class="card">
        <img src="https://d3sftlgbtusmnv.cloudfront.net/blog/wp-content/uploads/2024/08/Exterior-view-Cover-Photo-840x425.jpg" alt="Image 2">
        <div class="card-content">
            <h3>Tirupathi</h3>
            <p>It is one of the famous temple of lord venkateswara in India</p>
            <button>Read More</button>
        </div>
    </div>

    <div class="card">
        <img src="https://media.istockphoto.com/id/520840182/photo/red-fort-lal-qila-with-indian-flag-delhi-india.
        jpg?s=612x612&w=0&k=20&c=pOIkOX7dnJh2zwJhF9HrknY7kwYZtDgOd1n98wkHCKQ=" alt="Image 3">
        <div class="card-content">
            <h3>RedFort</h3>
            <p>It is one of the famous patriotic monument in India</p>
            <button>Read More</button>
        </div>
    </div>

</div>

</body>
</html>
