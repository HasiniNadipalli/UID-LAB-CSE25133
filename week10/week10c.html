<!DOCTYPE html>
<html>
<head>
    <title>Largest of Five Numbers</title>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #84fab0, #8fd3f4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 330px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
            transition: 0.3s;
        }

        .box:hover {
            transform: scale(1.03);
        }

        h2 {
            margin-bottom: 15px;
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 7px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4caf50;
            outline: none;
            box-shadow: 0 0 6px rgba(76,175,80,0.4);
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 6px;
            background:  linear-gradient(135deg, #6ce398, #78bcdf);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background:   linear-gradient(135deg, #50be78, #4e85a0);
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Find Largest Number</h2>

    <input type="number" id="num1" placeholder="Enter number 1">
    <input type="number" id="num2" placeholder="Enter number 2">
    <input type="number" id="num3" placeholder="Enter number 3">
    <input type="number" id="num4" placeholder="Enter number 4">
    <input type="number" id="num5" placeholder="Enter number 5">

    <button onclick="findLargest()">Find Largest</button>
    <button onclick="resetFields()">Reset</button>

    <p id="result"></p>
</div>

<script>

function findLargest() {
    let a = parseFloat(document.getElementById("num1").value);
    let b = parseFloat(document.getElementById("num2").value);
    let c = parseFloat(document.getElementById("num3").value);
    let d = parseFloat(document.getElementById("num4").value);
    let e = parseFloat(document.getElementById("num5").value);

    let res = document.getElementById("result");

    // Validation
    if (isNaN(a) || isNaN(b) || isNaN(c) || isNaN(d) || isNaN(e)) {
        alert("Please enter all numbers");
        return;
    }

    // Conditional logic
    let largest;

    if (a >= b && a >= c && a >= d && a >= e) {
        largest = a;
    } 
    else if (b >= a && b >= c && b >= d && b >= e) {
        largest = b;
    } 
    else if (c >= a && c >= b && c >= d && c >= e) {
        largest = c;
    } 
    else if (d >= a && d >= b && d >= c && d >= e) {
        largest = d;
    } 
    else {
        largest = e;
    }

    let output = "Largest Number is: " + largest;

    res.innerHTML = output;
    res.style.color = "green";
    alert(output);
}

// Reset function
function resetFields() {
    document.getElementById("num1").value = "";
    document.getElementById("num2").value = "";
    document.getElementById("num3").value = "";
    document.getElementById("num4").value = "";
    document.getElementById("num5").value = "";
    document.getElementById("result").innerHTML = "";
}

</script>

</body>
</html>
